<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registered Patients</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="../assets/style.css">

  <!-- Script -->
  <script src="../js/patients.js" defer></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-image: url('../assets/clinic-bg.jpg'); /* fixed path */
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center;
      background-attachment: fixed;
      min-height: 100vh;
      margin: 0;
      padding: 0;
    }

 .modal-custom {
  background-color: #fff;
  box-shadow: 0 0 20px rgba(0,0,0,0.2);
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 1050;
  max-width: 700px;
  width: 100%;
  padding: 20px;
  border-radius: 12px;
}



  </style>
</head>
<body>

      <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <span class="navbar-brand">Mcstuffin's Clinic</span>
            <span class="navbar-brand">Log out</span>
    </div>
  </nav>

  <!-- Sidebar -->
  <div class="sidebar">
    <h4 class="text-white text-center mb-4">Secretary Panel </h4>
    <a href="../secretary_dashboard.html">Dashboard</a>
    <a href="#">Profile</a>
    <a href="se_appointments.html">Appointments</a>
    <a href="doc_patients.html" class="active">Patients</a>
    <a href="#">Labaratory</a>

  </div>




  <!-- Main Content -->
  <div class="content">
    <h3 class="mb-4 text-dark">Registered Patients</h3>

    <div class="table-responsive">
      <table class="table table-bordered table-striped bg-white">
        <thead class="table-dark">
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Birthdate</th>
            <th>Sex</th>
            <th>Contact #</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="patientsTableBody"></tbody>
      </table>
    </div>
  </div>



<!-- Edit Modal -->
<div class="modal-custom" id="updateModal" style="display: none;">
  <h4 class="mb-4 text-center">Edit Patient</h4>
  <div class="row g-3">
    <div class="col-md-6">
      <label class="form-label">Name</label>
      <input type="text" id="editName" class="form-control rounded-3">
    </div>
    <div class="col-md-6">
      <label class="form-label">Email</label>
      <input type="email" id="editEmail" class="form-control rounded-3">
    </div>
    <div class="col-md-6">
      <label class="form-label">Birthdate</label>
      <input type="date" id="editBirthdate" class="form-control rounded-3">
    </div>
    <div class="col-md-6">
      <label class="form-label">Sex</label>
      <select id="editSex" class="form-select rounded-3">
        <option value="1">Male</option>
        <option value="0">Female</option>
      </select>
    </div>
    <div class="col-md-6">
      <label class="form-label">Contact #</label>
      <input type="text" id="editContact" class="form-control rounded-3">
    </div>
    <div class="col-md-6">
      <label class="form-label">Address</label>
      <textarea id="editAddress" class="form-control rounded-3"></textarea>
    </div>
  </div>
  <div class="d-flex justify-content-end gap-2 mt-4">
    <button onclick="saveUpdate()" class="btn btn-primary px-4">Save</button>
    <button onclick="closeModal()" class="btn btn-secondary px-4">Cancel</button>
  </div>
</div>




  <!-- View Modal -->
  <div class="modal" id="viewModal" style="display: none;">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Patient Details</h5>
          <button type="button" class="btn-close" onclick="closeViewModal()"></button>
        </div>
        <div class="modal-body">
          <p><strong>Name:</strong> <span id="viewName"></span></p>
          <p><strong>Email:</strong> <span id="viewEmail"></span></p>
          <p><strong>Birthdate:</strong> <span id="viewBirthdate"></span></p>
          <p><strong>Sex:</strong> <span id="viewSex"></span></p>
          <p><strong>Contact:</strong> <span id="viewContact"></span></p>
          <p><strong>Address:</strong> <span id="viewAddress"></span></p>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="closeViewModal()">Close</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Axios -->
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

</body>
</html>
