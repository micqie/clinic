<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secretary Appointment Management</title>
    <link rel="stylesheet" href="../assets/style.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
    <div class="container">
        <h2>Appointment Requests Management</h2>
        
        <!-- Appointments Table -->
        <div class="table-container">
            <table class="appointments-table">
                <thead>
                    <tr>
                        <th>Patient Name</th>
                        <th>Date</th>
                        <th>Status</th>
                        <th>Doctor</th>
                        <th>Queue Number</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="appointmentsTableBody">
                    <!-- Appointments will be loaded here -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Confirm Appointment Modal -->
    <div id="confirmModal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close" onclick="closeConfirmModal()">&times;</span>
            <h3>Confirm Appointment</h3>
            <div id="modalContent">
                <p><strong>Patient:</strong> <span id="modalPatientName"></span></p>
                <p><strong>Date:</strong> <span id="modalDate"></span></p>
                <p><strong>Queue Number:</strong> <span id="modalQueue"></span></p>
                
                <div class="form-group">
                    <label for="doctorSelect">Select Doctor:</label>
                    <select id="doctorSelect" required>
                        <option value="">Choose a doctor...</option>
                    </select>
                </div>
                
                <div class="modal-actions">
                    <button onclick="confirmAppointment()" class="btn btn-success">Confirm Appointment</button>
                    <button onclick="closeConfirmModal()" class="btn btn-secondary">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/secretary_appointments.js"></script>
</body>
</html>
