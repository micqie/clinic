<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Doctor Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
   <link rel="stylesheet" href="assets/style.css">
<style>
  body {
    font-family: Arial, sans-serif;
    background-image: url('assets/clinic-bg.jpg');
    background-size: cover;
    background-repeat: no-repeat;
    background-position: center;
    background-attachment: fixed;
    min-height: 100vh;
    margin: 0;
    padding: 0;
  }
</style>
</head>
<body>


  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <span class="navbar-brand">Mcstuffin's Clinic</span>
            <span class="navbar-brand">Log out</span>
    </div>
  </nav>

  <div class="sidebar">
    <h4 class="text-white text-center mb-4">Doctor Panel </h4>
    <a href="#">Dashboard</a>
    <a href="#">Profile</a>
    <a href="#">Appointments</a>
    <a href="users/doc_patients.html">Patients</a>
    <a href="users/doc_medicines.html">Medicines</a>
    <a href="#">Labaratory</a>

  </div>

  <!-- Main Content -->
  <div class="content">
    <h2></h2>


    <div class="row mt-4">
      <div class="col-md-4">
        <div class="card text-white bg-primary mb-3">
          <div class="card-body">
            <h5 class="card-title">Today's Appointments</h5>
            <p class="card-text" id="appointment-count"></p>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card text-white bg-success mb-3">
          <div class="card-body">
            <h5 class="card-title">Active Patients</h5>
            <p class="card-text" id="patient-count"></p>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card text-white bg-warning mb-3">
          <div class="card-body">
            <h5 class="card-title">Available Medicines</h5>
            <p class="card-text" id="medicine-count"></p>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card text-white bg-warning mb-3">
          <div class="card-body">
            <h5 class="card-title">Labaratory Tests</h5>
            <p class="card-text" id="medicine-count"></p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
