<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clinic Login/Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="js/index.js" defer></script>
  <style>
      body {
    font-family: Arial, sans-serif;
    background-image: url('assets/clinic-bg.jpg'); /* This works if assets is in the same directory as your HTML */
    background-size: cover;
    background-repeat: no-repeat;
    background-position: center;
    background-attachment: fixed;
    min-height: 100vh;
    margin: 0;
    padding: 0;
  }
    .hidden { display: none; }
    .form-container {
      max-width: 400px;
      margin: 50px auto;
      padding: 30px;
      border: 1px solid #ddd;
      border-radius: 10px;
      background: #f8f9fa;
    }
    .toggle-text {
      text-align: center;
      margin-top: 15px;
      cursor: pointer;
      color: #007bff;
    }
    .toggle-text:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="text-center mt-4 mb-4">Clinic System</h1>

    <!-- Login Form -->
    <div id="loginForm" class="form-container">
      <h4 class="text-center">Login</h4>
      <form>
        <div class="mb-3">
          <input type="email" class="form-control" id="loginEmail" placeholder="Email" required>
        </div>
        <div class="mb-3">
          <input type="password" class="form-control" id="loginPassword" placeholder="Password" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Login</button>
      </form>
      <div class="toggle-text" onclick="toggleForms()">Don't have an account? Register</div>
    </div>

    <!-- Register Form -->
    <div id="registerForm" class="form-container hidden">
      <h4 class="text-center">Register</h4>
      <form>
        <div class="mb-3">
          <input type="text" class="form-control" id="registerFullName" placeholder="Full Name" required>
        </div>
        <div class="mb-3">
          <input type="email" class="form-control" id="registerEmail" placeholder="Email" required>
        </div>
        <div class="mb-3">
          <input type="password" class="form-control" id="registerPassword" placeholder="Password" required>
        </div>
        <div class="mb-3">
          <select class="form-select" id="registerRole" required>
            <option value="patient">Patient</option>
            <option value="secretary">Secretary</option>
            <option value="doctor">Doctor</option>
          </select>
        </div>
        <button type="submit" class="btn btn-success w-100">Register</button>
      </form>
      <div class="toggle-text" onclick="toggleForms()">Already have an account? Login</div>
    </div>

    <div id="response" class="text-center mt-3 text-danger"></div>
  </div>
</body>
</html>
